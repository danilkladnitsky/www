server {
  listen 80;
  listen [::]:80;
  server_name kladnitsky.ru www.kladnitsky.ru;

  root /var/www/www.kladnitsky.ru;
  index index.html;
  server_tokens off;

  # Never cache HTML
  location ~* \.html?$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /404.html;
  }

  # Next.js immutable assets
  location ^~ /_next/static/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Other static assets
  location ~* \.(?:js|mjs|css|png|jpg|jpeg|gif|svg|ico|webp|avif|ttf|otf|woff|woff2)$ {
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  # Default: file or SPA fallback to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Compression
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css application/javascript application/json
    image/svg+xml application/xml application/rss+xml
    application/vnd.ms-fontobject application/x-font-ttf font/opentype;
}