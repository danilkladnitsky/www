server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name kladnitsky.ru www.kladnitsky.ru;

  root /var/www/www.kladnitsky.ru;
  index index.html;
  server_tokens off;

 # --- SSL files ---
  ssl_certificate     /etc/nginx/ssl/kladnitsky.ru/domain.crt;  # full chain
  ssl_certificate_key /etc/nginx/ssl/kladnitsky.ru/domain.key;    # private key

  # --- SSL settings (safe defaults) ---
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # Never cache HTML
  location ~* \.html?$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /404.html;
  }

  # Next.js immutable assets
  location ^~ /_next/static/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Other static assets
  location ~* \.(?:js|mjs|css|png|jpg|jpeg|gif|svg|ico|webp|avif|ttf|otf|woff|woff2)$ {
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  # Default: file or SPA fallback to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Compression
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css application/javascript application/json
    image/svg+xml application/xml application/rss+xml
    application/vnd.ms-fontobject application/x-font-ttf font/opentype;
}

# --- blog.kladnitsky.ru ---
