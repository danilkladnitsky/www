name: Build and Deploy Personal Page

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    environment: production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check SSH variables exist
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          if [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ] || [ -z "$SSH_PORT" ] || [ -z "$SSH_KEY" ]; then
            echo "SSH variables are not set"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: www/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('www/package-lock.json') }}
          restore-keys: |
            nextjs-${{ runner.os }}-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: www/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build Next.js
        run: npm run build

      - name: Upload build to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "www/out/*"
          target: /var/www/www.kladnitsky.ru/
          rm: true
          overwrite: true
